name: FlaskDash Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3 \
            python3-pip \
            python3-venv \
            python3-dev \
            build-essential \
            libpq-dev \
            git \
            curl \
            nginx

      - name: Set Up Python Virtual Environment
        run: |
          python3 -m venv venv
          echo "$GITHUB_WORKSPACE/venv/bin" >> $GITHUB_PATH

      - name: Show Environment Info
        run: |
          echo "Running on self-hosted runner"
          python --version
          pip --version

      - name: Pull Latest Changes
        run: |
          git fetch origin
          git reset --hard origin/main

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set Up Environment Variables
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
            echo "WARNING: .env created from .env.example — update secrets before proceeding"
          fi

      - name: Run Database Migrations
        run: |
          flask db upgrade

      - name: Configure Systemd Service
        run: |
          sudo bash -c 'cat > /etc/systemd/system/flaskdash.service << EOF
          [Unit]
          Description=FlaskDash Application
          After=network.target

          [Service]
          User=$USER
          WorkingDirectory=$GITHUB_WORKSPACE
          Environment="PATH=$GITHUB_WORKSPACE/venv/bin"
          ExecStart=$GITHUB_WORKSPACE/venv/bin/gunicorn -w 4 -b 0.0.0.0:5000 "app:create_app()"
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF'
          sudo systemctl daemon-reload
          sudo systemctl enable flaskdash

      - name: Restart FlaskDash Service
        run: |
          sudo systemctl restart flaskdash

      - name: Verify Service Status
        run: |
          sudo systemctl status flaskdash --no-pager