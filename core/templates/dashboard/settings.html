{% extends "dashboard/base.html" %}
{% block title %}{{ g.settings['site_title'] }} - Settings{% endblock %}
{% block main %}
<div class="max-w-2xl mx-auto space-y-6">
	{% for category in registered_settings_categories %}
	<div class="card p-6">
		<div class="border-b border-blue-600/[0.09] pb-3.5 mb-2">
			<h3 class="font-semibold text-blue-800">{{ category.nice_name }}</h3>
			<p class="text-sm text-blue-800/45">{{ category.description }}</p>
		</div>
		<form method="POST" class="space-y-2">
			{{ form.hidden_tag() }} 
            
            <div class="flex items-center gap-2 pt-2">
				<button type="submit" class="btn btn-primary">
					<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
					</svg> Save Changes </button>
				<button type="reset" class="btn btn-outline">Reset</button>
			</div>
		</form>
	</div>
	{% endfor %}
</div>
{% endblock %}
